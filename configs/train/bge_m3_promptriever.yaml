run_name: bge_m3_promptriever
output_dir: outputs/train/bge_m3_promptriever
seed: 42
model_config: configs/models/bge_m3.yaml
dataset_path: data/processed/sberquad_promptriever.jsonl
train_splits:
  - train
eval_splits:
  - validation
training_mode: promptriever
device: auto
use_lora: true
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - query
    - key
    - value
  bias: none
  modules_to_save: []
batch_size: 16
eval_batch_size: 32
num_epochs: 1
learning_rate: 0.0001
warmup_ratio: 0.1
evaluation_steps: 0
max_steps: null
max_train_samples: null
max_eval_samples: 1000
save_every_steps: 500
use_fp16: false
temperature: 0.01
negatives_per_sample: 2
include_hard_negatives: true
