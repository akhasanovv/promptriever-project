run_name: e5_instruction_pairs_baseline
output_dir: outputs/train/e5_instruction_pairs_baseline
seed: 42
model_config: configs/models/multilingual_e5_base.yaml
dataset_path: data/processed/sberquad_instruction_pairs.jsonl
train_splits:
  - train
eval_splits:
  - validation
training_mode: binary_instruction_pairs
loss: cosine_similarity
device: auto
use_lora: true
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - query
    - key
    - value
  bias: none
  modules_to_save: []
batch_size: 32
eval_batch_size: 64
num_epochs: 1
learning_rate: 0.0001
warmup_ratio: 0.1
evaluation_steps: 0
max_steps: null
max_train_samples: null
max_eval_samples: 1000
save_every_steps: 500
use_fp16: false
